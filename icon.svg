<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="50%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#FF6584"/>
    </linearGradient>
    <linearGradient id="hat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D2B55"/>
      <stop offset="100%" stop-color="#1B1A3E"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>
    <linearGradient id="glass2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6584"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)"/>

  <!-- Hat brim -->
  <ellipse cx="256" cy="210" rx="175" ry="28" fill="url(#hat)"/>

  <!-- Hat dome -->
  <path d="M130 210 Q130 110 256 100 Q382 110 382 210" fill="url(#hat)"/>

  <!-- Hat band -->
  <rect x="130" y="195" width="252" height="18" rx="4" fill="#FF6584" opacity="0.9"/>

  <!-- Left lens -->
  <ellipse cx="195" cy="275" rx="68" ry="55" fill="#1B1A3E" stroke="url(#glass)" stroke-width="8"/>
  <!-- Left lens shine -->
  <ellipse cx="178" cy="258" rx="22" ry="16" fill="url(#glass)" opacity="0.35"/>

  <!-- Right lens -->
  <ellipse cx="317" cy="275" rx="68" ry="55" fill="#1B1A3E" stroke="url(#glass2)" stroke-width="8"/>
  <!-- Right lens shine -->
  <ellipse cx="300" cy="258" rx="22" ry="16" fill="url(#glass2)" opacity="0.35"/>

  <!-- Bridge -->
  <path d="M263 275 Q256 255 249 275" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>

  <!-- Nose hint -->
  <path d="M248 310 Q256 340 264 310" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- Smile -->
  <path d="M210 355 Q256 390 302 355" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

  <!-- Question mark sparkle (anonymous vibe) -->
  <text x="370" y="155" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#FFD54F" opacity="0.9">?</text>

  <!-- Small sparkles -->
  <circle cx="115" cy="145" r="6" fill="#00E5FF" opacity="0.8"/>
  <circle cx="400" cy="380" r="5" fill="#FFD54F" opacity="0.7"/>
  <circle cx="135" cy="370" r="4" fill="#FF6584" opacity="0.6"/>
</svg>
