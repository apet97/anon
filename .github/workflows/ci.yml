name: ci

on:
  push:
    branches: [main, refactor/enterprise]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test + type-check + build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.x", "22.x"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify migrations were copied to dist
        run: |
          test -f dist/db/migrations/001_initial.sql
          test -f dist/db/migrations/002_pending_replies.sql
          test -f dist/db/migrations/003_audit_log.sql
          test -f dist/db/migrations/004_tokens.sql

      - name: Check no secrets are tracked
        if: matrix.node-version == '20.x'
        run: |
          if git ls-files | grep -E '(^|/)(tokens\.json|\.pumbleapprc|\.env|.*\.db|.*\.db-wal|.*\.db-shm)$'; then
            echo "::error::Tracked secret-like file detected"
            exit 1
          fi

  docker:
    name: docker build smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: anon:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
